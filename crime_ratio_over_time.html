      update.hovertemplate.push('<b>%{fullData.name}</b><br>%{x|%Y}<br>Share: %{y:.2%}<br>Crime count: %{customdata[0]}<br>All crimes: %{customdata[1]}<extra></extra>');
    }
  }
  Plotly.restyle(gd, update, [...Array(allSeries.length).keys()]).then(() => {
    isSyncingResolution = false;
  });
}

gd.on('plotly_relayout', function() {
  syncResolution();
});

gd.on('plotly_restyle', function(eventData) {
  if (isSyncingResolution) return;
  const edits = eventData[0] || {};
  const targets = eventData[1] || [];
  if (!('visible' in edits)) return;
  const values = Array.isArray(edits.visible) ? edits.visible : [edits.visible];
  targets.forEach((traceIndex, idx) => {
    const value = values[Math.min(idx, values.length - 1)];
    selectedStates[traceIndex] = !(value === 'legendonly' || value === false);
  });
  syncResolution();
});

syncResolution();

                        })                };            </script>        </div>
